<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | CourierTrack</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="favicon.PNG">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- TOP CONTACT BAR -->
    <div class="top-bar" style="background: #111827; color: #e5e7eb; padding: 0.5rem 0; font-size: 0.85rem; border-bottom: 1px solid #374151;">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; flex-wrap: wrap;">
            <div class="contact-info" style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                <span>📧 email@example.com</span>
                <span>📞 +1 234 567 8900</span>
                <span>📍 123 Logistics St, New York, NY 10001</span>
            </div>
        </div>
    </div>

    <header>
        <div class="container header-inner">
            <h2>CourierTrack <span class="subtle-text">Admin</span></h2>
            <nav class="nav-links">
                <a href="index.html">Back to Home</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="auth-container">
            <div class="glass-panel auth-form">
                <h2>Set New Password</h2>
                <div id="reset-error" class="alert alert-error"></div>
                
                <form id="reset-password-form">
                    <p style="text-align: center; margin-bottom: 1rem; font-size: 0.9rem; color: var(--secondary-color);">Please enter your new password below.</p>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="new-password" class="form-control" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Reset Password</button>
                </form>

                <div id="success-message" style="display: none; text-align: center;">
                    <p style="color: #4ade80; margin-bottom: 1rem;">Password reset successfully!</p>
                    <a href="dashboard.html" class="btn btn-primary">Go to Login</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('reset-password-form');
            const errorDiv = document.getElementById('reset-error');
            const successDiv = document.getElementById('success-message');
            
            // Extract token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                errorDiv.textContent = "Invalid or missing reset token.";
                errorDiv.style.display = 'block';
                form.style.display = 'none';
                return;
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = document.getElementById('new-password').value;
                errorDiv.style.display = 'none';

                try {
                    const res = await fetch(`/api/auth/reset-password/${token}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password: newPassword })
                    });
                    
                    const data = await res.json();
                    
                    if (!res.ok) {
                        throw new Error(data.msg || 'Failed to reset password');
                    }

                    // Success
                    form.style.display = 'none';
                    successDiv.style.display = 'block';
                    
                } catch (err) {
                    errorDiv.textContent = err.message;
                    errorDiv.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
